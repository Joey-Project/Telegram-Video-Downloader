[telegram]
token = "123456789:replace-with-your-token"
allowed_chat_ids = [123456789]
allow_all_chats = false

[downloads]
video_dir = "~/Movies/Downloads"
pdf_dir = "~/Documents/Downloads"

[tools]
# Bilibili downloads/auth use the embedded bbdown-core crate; bbdown is kept for legacy helpers only.
bbdown = "bbdown"
yt_dlp = "yt-dlp"
uv = "uv"
pdf_helper = "scripts/pdf_helper.py"
chrome = "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
ffmpeg = "ffmpeg"

[pdf]
auto_domains = ["mp.weixin.qq.com"]

[video]
subtitle_languages = ["zh-Hans", "zh-Hant", "zh", "zh-CN", "zh-TW", "en", "ja"]
write_nfo = true
keep_sidecars = true

[bilibili]
# Legacy CLI passthrough fields are kept for config compatibility.
# Direct bbdown-core integration reads known global args and --only download modes only.
extra_args = []
global_args = []
plan_args = []
download_args = []
# playurl_mode = "web" # web | tv | app
# restricted_area = "cn" # cn | th | hk | tw
restricted_area_proxies = []
restricted_api_proxies = []
danmaku_formats = ["xml", "ass"]

[bilibili.danmaku]
enabled = true

[bilibili.auth]
# Legacy bot-managed Web cookie state; BBDown-rust credentials live in credential_file.
state_path = "~/.local/state/telegram-video-downloader/bilibili-auth.json"
credential_file = "~/.local/state/telegram-video-downloader/bbdown-credentials.json"
# credential_profile = "default"
login_timeout_seconds = 180
poll_interval_seconds = 2

[bot]
concurrency = 2
poll_timeout_seconds = 50
progress_update_seconds = 5
command_timeout_seconds = 7200
command_idle_timeout_seconds = 300
